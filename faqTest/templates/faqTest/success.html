<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Inviato - DeepTrace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-center messages" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <div class="container py-5 text-center">
        <div class="card shadow p-5">
            <h1 class="text-success">✅ Test Completato!</h1>
            <p class="lead mt-3">Le risposte per <strong>{{ test.paziente_email }}</strong> sono state salvate.</p>
            <div class="alert alert-primary d-inline-block mt-2">
                <h3 class="mb-0">Punteggio Totale: {{ test.punteggio_totale }}</h3>
            </div>
            <p class="text-muted mt-4">Stiamo generando il report PDF da inviare via email...</p>
            <a href="/" class="btn btn-outline-secondary mt-3">Compila un altro test</a>
        </div>
    </div>

<script>
    setTimeout(function() {
        var alertList = document.querySelectorAll('.messages');
        alertList.forEach(function(alert) {
            alert.style.display = "none"
        });
    }, 3000);
</script>
</body>
</html>
